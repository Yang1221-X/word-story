.progress-mini .done-tag{background:#27ae60;color:#fff;padding:2px 8px;border-radius:8px;font-size:11px;font-weight:600}
.word-tags{display:flex;flex-wrap:wrap;gap:8px}
.wt{background:var(--s2);color:var(--t);padding:6px 14px;border-radius:20px;font-size:14px;cursor:pointer;transition:all .2s;font-weight:500;border:1.5px solid transparent;display:flex;align-items:center;gap:4px}

.wt.used{opacity:.4;text-decoration:line-through}
.wt .wtpos{font-size:10px;opacity:.5;text-transform:uppercase}

.sen-block.active{background:var(--hi);border-color:var(--hit)}

.hw{background:var(--hi);color:var(--hit);padding:1px 7px;border-radius:5px;cursor:pointer;font-weight:700;position:relative;transition:all .2s;border-bottom:2px solid var(--hib);white-space:nowrap}

// ============ WORD TRACKING ============
function getUsed(level){return JSON.parse(localStorage.getItem("ws_used_"+level)||"[]");}
function markUsed(level,words){
  var u=getUsed(level);
  words.forEach(function(w){if(u.indexOf(w[0])===-1)u.push(w[0]);});
  localStorage.setItem("ws_used_"+level,JSON.stringify(u));
}
function resetUsed(level){localStorage.removeItem("ws_used_"+level);renderLevelBar();regenerate();}

// ============ WORD PICKING ============
function pickWords(level,n){
  var all=WB[level].slice(),used=getUsed(level);
  var unused=[],usedPool=[];
  all.forEach(function(w){if(used.indexOf(w[0])===-1)unused.push(w);else usedPool.push(w);});
  var pool=unused.length>=n?unused:unused.concat(usedPool);
  var picked=[];
  for(var i=0;i<n&&pool.length>0;i++){
    var idx=Math.floor(Math.random()*pool.length);
    picked.push(pool.splice(idx,1)[0]);
  }
  return picked;
}

}
function escapeHTML(s){return s.replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;");}
function unescapeHTML(s){return s.replace(/&amp;/g,"&").replace(/&lt;/g,"<").replace(/&gt;/g,">").replace(/&quot;/g,'"');}

// ============ STORY GENERATION ============
function genStoryLocal(words){
  var byPos={n:[],v:[],adj:[],adv:[]};
  words.forEach(function(w){
    var pos=w[2];
    if(pos==="n.")byPos.n.push(w);else if(pos==="v.")byPos.v.push(w);
    else if(pos==="adj.")byPos.adj.push(w);else if(pos==="adv.")byPos.adv.push(w);
    else byPos.n.push(w);
  });
  var fw=FRAMEWORKS[Math.floor(Math.random()*FRAMEWORKS.length)];
  var outro=OUTROS[Math.floor(Math.random()*OUTROS.length)];
  var sentences=[{wi:-1,en:fw.en,zh:fw.zh,struct:"开场句 · Opening",g:""}];
  var usedP={n:0,v:0,adj:0,adv:0};
  words.forEach(function(w,i){
    var pos=w[2],cat=pos==="n."?"n":pos==="v."?"v":pos==="adj."?"adj":pos==="adv."?"adv":"n";
    var patterns=PATTERNS[cat]||PATTERNS["n"];
    var pi=usedP[cat]%patterns.length;usedP[cat]++;
    var pat=patterns[pi];
    sentences.push({wi:i,en:pat.en.replace("{WORD}",wordSpan(w)),zh:pat.zh.replace("{WORD}",w[1]||w[0]),struct:pat.struct,g:pat.g.replace("{WORD}","<b>"+w[0]+"</b>")});
  });
  sentences.push({wi:-1,en:outro.en,zh:outro.zh,struct:"结尾句 · Closing",g:""});
  return{title:fw.title,sentences:sentences,words:words,level:curLevel};
}

// ============ RENDER ============
function renderLevelBar(){
  document.getElementById("lvBar").innerHTML=LEVELS.map(function(l){
    var total=WB[l].length,used=getUsed(l).length;
    return '<span class="lv'+(l===curLevel?" act":"")+'" onclick="setLevel(\''+l+'\')">'+LNAMES[l]+' <span class="lv-n">('+used+'/'+total+'词)</span></span>';
  }).join("");
}
function setLevel(l){curLevel=l;renderLevelBar();regenerate();}

function renderWords(){
  var total=WB[curLevel].length,used=getUsed(curLevel).length;
  document.getElementById("pu").textContent=used;
  document.getElementById("ptotal").textContent=total;
  document.getElementById("pfill").style.width=(total>0?used/total*100:0)+"%";
  var doneTag=document.getElementById("doneTag");
  doneTag.style.display=(used>=total&&total>0)?"inline":"none";
  document.getElementById("wordTags").innerHTML=curWords.map(function(w){
    var isUsed=getUsed(curLevel).indexOf(w[0])!==-1;
    var cls="wt"+(isUsed?" used":"");
    return '<span class="'+cls+'" onclick="showWordPopup(event,this)" data-w="'+w[0]+'" data-zh="'+(w[1]||"")+'" data-pos="'+w[2]+'" data-ex="'+escapeHTML(w[3]||"")+'">'+w[0]+' <span class="wtpos">'+w[2]+'</span></span>';
  }).join("");
}

function renderStory(){
  curSent=-1;
  if(!curStory||!curStory.sentences||curStory.sentences.length===0){
    document.getElementById("stitle").textContent="📖 生成故事中...";
    document.getElementById("stext").innerHTML="";
    return;
  }
  var html=curStory.sentences.map(function(s,i){
    var cls="sen-block"+(i===curSent?" active":"");
    var tooltip=s.zh?('<div class="sen-tooltip"><div class="st-label">📝 中文翻译</div><div class="st-zh">'+s.zh+'</div><div class="st-struct">🏗️ '+s.struct+'</div>'+(s.g?'<div class="st-label" style="margin-top:6px">📐 语法分析</div><div class="st-grammar">'+s.g+'</div>':'')+'</div>'):"";
    return '<div class="'+cls+'" data-si="'+i+'" onclick="setActiveSent('+i+')"><div class="en-text">'+s.en+'</div>'+tooltip+'</div>';
  }).join("");
  document.getElementById("stitle").textContent="📖 "+curStory.title+" · "+LNAMES[curLevel];
  document.getElementById("stext").innerHTML=html;
  document.getElementById("stext").querySelectorAll(".hw").forEach(function(el){
    el.addEventListener("click",function(e){e.stopPropagation();showWordPopup(e,this);});
  });
  updateNav();updateFavBtn();
}

function setActiveSent(i){curSent=i;updateSentActive();updateNav();}
function updateSentActive(){document.querySelectorAll(".sen-block").forEach(function(s,i){s.classList.toggle("active",i===curSent);});}
function updateNav(){document.getElementById("pb").disabled=curSent<=0;document.getElementById("nb2").disabled=curSent>=curStory.sentences.length-1;}
function goNext(){if(curSent>=curStory.sentences.length-1)return;curSent++;updateSentActive();updateNav();}
function goPrev(){if(curSent<=0)return;curSent--;updateSentActive();updateNav();}

// ============ WORD POPUP ============
function showWordPopup(e,el){
  e.stopPropagation();
  var popup=document.getElementById("wordPopup");
  document.getElementById("wpWord").textContent=el.dataset.w;
  document.getElementById("wpPos").textContent=el.dataset.pos;
  document.getElementById("wpMeaning").textContent=el.dataset.zh||"(释义待补充)";
  document.getElementById("wpExample").textContent=unescapeHTML(el.dataset.ex||"");
  var rect=el.getBoundingClientRect();
  var top=rect.bottom+8,left=rect.left+rect.width/2;
  if(top+200>window.innerHeight)top=rect.top-210;
  if(left+180>window.innerWidth)left=window.innerWidth-190;
  if(left<10)left=10;
  popup.style.top=top+"px";popup.style.left=left+"px";
  popup.classList.add("show");
  clearTimeout(popup._t);
  popup._t=setTimeout(function(){popup.classList.remove("show");},4000);
  function closePopup(ev){if(!popup.contains(ev.target)&&ev.target!==el){popup.classList.remove("show");document.removeEventListener("click",closePopup);}}
  setTimeout(function(){document.addEventListener("click",closePopup);},100);
}

// ============ SPEECH ============
function speakSent(){
  if(curSent<0)curSent=0;updateSentActive();
  var s=curStory.sentences[curSent];
  var txt=s.en.replace(/<[^>]+>/g,"");
  var u=new SpeechSynthesisUtterance(txt);
  u.lang="en-US";u.rate=0.85;
  var voices=speechSynthesis.getVoices();
  var enVoice=voices.find(function(v){return v.lang.startsWith("en")&&v.name.indexOf("Female")!==-1;})||voices.find(function(v){return v.lang.startsWith("en");});
  if(enVoice)u.voice=enVoice;
  speechSynthesis.cancel();speechSynthesis.speak(u);
}

// ============ FAVORITES ============
function toggleFav(){
  if(!curStory||curSent<0)return;
  var s=curStory.sentences[curSent];
  var w=curStory.words[s.wi];
  if(!w)return;
  var key=curStory.level+"/"+w[0];
  var idx=favs.findIndex(function(f){return f.key===key;});
  if(idx===-1){
    favs.push({key:key,level:curStory.level,word:w[0],zh:w[1]||"",pos:w[2],ex:w[3]||"",en:s.en.replace(/<[^>]+>/g,""),zhSent:s.zh,struct:s.struct,time:Date.now()});
    showToast("⭐ 已收藏");
  }else{
    favs.splice(idx,1);
    showToast("已取消收藏");
  }
  updateFavBtn();updateFavCount();save();
}
function updateFavBtn(){
  if(!curStory||curSent<0)return;
  var s=curStory.sentences[curSent];
  var w=curStory.words[s.wi];
  var key=curStory.level+"/"+(w?w[0]:"");
  var isFav=favs.some(function(f){return f.key===key;});
  document.getElementById("fb").innerHTML=isFav?"❤️ 已收藏":"🤍 收藏";
}
function updateFavCount(){document.getElementById("fc").textContent=favs.length;}
function toggleFavPanel(){
  var fp=document.getElementById("fp");
  if(fp.style.display==="none"){fp.style.display="block";renderFavList();}else{fp.style.display="none";}
}
function renderFavList(){
  if(favs.length===0){document.getElementById("flist").innerHTML='<div style="padding:20px;text-align:center;color:var(--t3)">暂无收藏</div>';document.getElementById("fpdone").textContent="";return;}
  document.getElementById("fpdone").textContent="共 "+favs.length+" 条";
  document.getElementById("flist").innerHTML=favs.slice().reverse().map(function(f,i){
    return '<div class="fi" onclick="loadFav('+(favs.length-1-i)+')"><div class="fn">'+f.word+' <span style="font-size:12px;color:var(--t3)">'+f.pos+'</span></div><div class="fs">'+LNAMES[f.level]+'</div></div>';
  }).join("");
}
function loadFav(idx){
  var f=favs[idx];
  if(!f)return;
  document.getElementById("fp").style.display="none";
  showToast("收藏内容已加载到预览区");
  document.getElementById("stitle").textContent="⭐ "+f.word+" · "+LNAMES[f.level];
  document.getElementById("stext").innerHTML='<div class="sen-block active"><div class="en-text">'+f.en+'</div><div class="sen-tooltip" style="display:block;position:static;transform:none;margin-top:12px"><div class="st-label">📝 中文翻译</div><div class="st-zh">'+f.zhSent+'</div><div class="st-struct">🏗️ '+f.struct+'</div></div></div>';
  curSent=0;
}

// ============ REGENERATE ============
function regenerate(){
  curWords=pickWords(curLevel,15);
  markUsed(curLevel,curWords);
  curStory=genStoryLocal(curWords);
  renderWords();renderStory();renderLevelBar();
}
function resetLevel(){
  if(confirm("确定要重置 "+LNAMES[curLevel]+" 的学习进度吗？所有已学单词记录将被清除。")){
    resetUsed(curLevel);
    showToast("🔄 进度已重置");
  }
}

// ============ API GENERATION (placeholder) ============
function genStoryAPI(){
  var status=document.getElementById("astatus");
  status.textContent="API 功能开发中，当前使用本地引擎生成...";
  setTimeout(function(){regenerate();status.textContent="✅ 已使用本地引擎生成";},500);
}

// ============ THEME ============
function toggleTheme(){theme=theme==="dark"?"light":"dark";document.body.setAttribute("data-theme",theme);document.getElementById("tb").textContent=theme==="dark"?"☀️ 亮色":"🌙 暗色";save();}
function showToast(msg){var t=document.getElementById("toast");t.textContent=msg;t.classList.add("on");clearTimeout(t._t);t._t=setTimeout(function(){t.classList.remove("on");},3000);}
function save(){localStorage.setItem("ws_favs_v4",JSON.stringify(favs));localStorage.setItem("ws_theme_v4",theme);}

// ============ KEYBOARD ============
document.addEventListener("keydown",function(e){if(e.target.tagName==="INPUT"||e.target.tagName==="TEXTAREA")return;if(e.key==="ArrowRight"||e.key==="ArrowDown"){e.preventDefault();goNext();}else if(e.key==="ArrowLeft"||e.key==="ArrowUp"){e.preventDefault();goPrev();}else if(e.key===" "){e.preventDefault();speakSent();}});

// ============ INIT ============
function init(){
  document.body.setAttribute("data-theme",theme);
  document.getElementById("tb").textContent=theme==="dark"?"☀️ 亮色":"🌙 暗色";
  document.getElementById("apk").value=localStorage.getItem("ws_apikey_v4")||"";
  document.getElementById("ape").value=localStorage.getItem("ws_apiendpoint_v4")||"https://api.openai.com/v1/chat/completions";
  speechSynthesis.getVoices();
  renderLevelBar();updateFavCount();
  curWords=pickWords(curLevel,15);
  markUsed(curLevel,curWords);
  curStory=genStoryLocal(curWords);
  renderWords();renderStory();
}
init();
</script>
